name: Build Max iOS
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install dependencies
        run: bun install

      - name: Prepare Tauri iOS
        run: bun tauri ios init --force
        continue-on-error: true

      - name: Build Xcode Project
        run: bun tauri ios build
        env:
          CODE_SIGNING_ALLOWED: NO
          CODE_SIGNING_REQUIRED: NO
          CODE_SIGN_IDENTITY: ""
          PROVISIONING_PROFILE_SPECIFIER: ""
          AD_HOC_CODE_SIGNING_ALLOWED: YES

      - name: Package IPA
        run: |
          mkdir -p Payload
          APP_PATH=$(find src-tauri/gen/apple/build/arm64/Release-iphoneos -name "*.app" | head -n 1)

          if [ -z "$APP_PATH" ]; then
            echo "Error: .app file not found!"
            find src-tauri/gen/apple -name "*.app"
            exit 1
          fi

          echo "Found app at: $APP_PATH"
          cp -r "$APP_PATH" Payload/
          zip -r Max_Unsigned.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Max-iOS-Build
          path: Max_Unsigned.ipa
          if-no-files-found: error
